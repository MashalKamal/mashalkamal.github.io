<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mehr Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="header"></div>

<main>

<!-- HERO SECTION -->
<section class="hero">
    <h1>Luxury Ethnic Wear</h1>

    <!-- SLIDESHOW -->
    <div class="hero-slideshow">
        <button onclick="prevSlide()">⬅</button>

        <img id="slide" src="images/outfit1.jpg" alt="Slideshow Image">

        <button onclick="nextSlide()">➡</button>
    </div>

    <a href="gallery.html">Shop Now</a>
</section>

<!-- FEATURES ONLY (kept your structure) -->
<section class="products">
    <h2>Why Choose Mehr Shop?</h2>

    <div class="layout">

        <div class="card">
            <h3>High Quality</h3>
            <p>Premium fabrics with detailed embroidery.</p>
        </div>

        <div class="card">
            <h3>Elegant Designs</h3>
            <p>Traditional and modern fashion styles.</p>
        </div>

        <div class="card">
            <h3>Cultural Beauty</h3>
            <p>Inspired by rich heritage.</p>
        </div>

    </div>
</section>

</main>

<div id="footer"></div>

<script src="scripts/include.js"></script>
<script src="scripts/slideshow.js"></script>

</body>
</html>

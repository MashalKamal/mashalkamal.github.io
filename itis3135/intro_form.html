<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Introduction Form</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    form {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
    }

    #output-area {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Introduction Form</h2>

<form id="intro-form">

  <label>First Name</label>
  <input id="firstName" required>

  <label>Last Name</label>
  <input id="lastName" required>

  <label>About You</label>
  <textarea id="about"></textarea>

  <button type="submit">Submit</button>

</form>

<div id="output-area"></div>

<script src="scripts/introduction.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Weather App</h1>

<!-- CITY SELECT -->
<select id="city-select">
  <option value="">Select a city</option>
  <option value="new york">New York</option>
  <option value="los angeles">Los Angeles</option>
  <option value="chicago">Chicago</option>
  <option value="tokyo">Tokyo</option>
  <option value="london">London</option>
</select>

<button id="get-weather-btn">Get Weather</button>

<hr>

<!-- OUTPUT ELEMENTS (REQUIRED IDS) -->
<img id="weather-icon" />

<p>Location: <span id="location"></span></p>

<p>Main Temp: <span id="main-temperature"></span></p>
<p>Feels Like: <span id="feels-like"></span></p>

<p>Humidity: <span id="humidity"></span></p>

<p>Wind Speed: <span id="wind"></span></p>
<p>Wind Gust: <span id="wind-gust"></span></p>

<p>Weather: <span id="weather-main"></span></p>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Basic styles to match your other pages */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        header, footer { background-color: #222; color: #fff; padding: 1em; text-align: center; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        main { padding: 2em; display: flex; gap: 1em; justify-content: center; flex-wrap: wrap; }
        .card { background: #fff; border: 1px solid #ccc; border-radius: 8px; width: 120px; padding: 10px; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);}
        .left, .right { font-size: 24px; }
        .middle div { margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Header -->
    <header id="header">
        <h1>Playing Cards</h1>
        <nav>
            <a href="#playing-cards">Cards</a>
            <a href="#footer">Footer</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main id="playing-cards">
        <div class="card">
            <div class="left">♠</div>
            <div class="middle">
                <div>10</div>
                <div>Hearts</div>
            </div>
            <div class="right">A</div>
        </div>
        <div class="card">
            <div class="left">♦</div>
            <div class="middle">
                <div>J</div>
                <div>Diamonds</div>
            </div>
            <div class="right">K</div>
        </div>
        <div class="card">
            <div class="left">♣</div>
            <div class="middle">
                <div>Q</div>
                <div>Clubs</div>
            </div>
            <div class="right">2</div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer">
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>

</body>
</html>

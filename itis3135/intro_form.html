<!DOCTYPE html>
<html lang="en">
<head>
  <title>Introduction Form</title>
  <link rel="stylesheet" href="styles/default.css">
</head>

<body>

<h2 id="page-h2">Introduction Form</h2>
<h3>Please submit the form below.</h3>

<form id="intro-form" novalidate>

  <label>First Name</label>
  <input id="firstName" required value="Mashal">

  <label>Last Name</label>
  <input id="lastName" required value="Gharzai">

  <label>Mascot Adjective</label>
  <input id="mascotAdj" required value="Curious">

  <label>Mascot Animal</label>
  <input id="mascotAnimal" required value="Falcon">

  <label>Divider</label>
  <input id="divider" value="~" required>

  <label>Image</label>
  <input type="file" id="imageFile">

  <img id="current-img" 
       src="https://img.freepik.com/premium-vector/cute-girl-study-with-computer-vector-illustration-white_835895-6032.jpg"
       width="200">

  <label>Caption</label>
  <input id="imageCaption" value="Studying on computer">

  <label>Personal Statement</label>
  <textarea id="personalStatement">I am from Afghanistan and studying IT.</textarea>

  <h3>Bullets</h3>
  <div id="bullets">
    <input name="bullet1" value="Personal Background: From Afghanistan.">
    <input name="bullet2" value="Academic Background: IT degree.">
    <input name="bullet3" value="Transferred to UNCC.">
    <input name="bullet4" value="Subject Background: IT.">
    <input name="bullet5" value="Primary Computer: Laptop.">
    <input name="bullet6" value="Hobbies: Reading.">
    <input name="bullet7" value="Goals: Graduate.">
  </div>

  <h3>Courses</h3>
  <div id="courses"></div>
  <button type="button" id="add-course">Add Course</button>

  <label>Quote</label>
  <input id="quote" value="Learning never stops.">

  <label>Author</label>
  <input id="quoteAuthor" value="Unknown">

  <br><br>
  <button type="submit">Submit</button>
  <button type="reset">Reset</button>
  <button type="button" id="clear-btn">Clear</button>
  <button type="button" id="generate-html">Generate HTML</button>
  <button type="button" id="generate-json">Generate JSON</button>

</form>

<div id="output-area"></div>

<script src="scripts/introduction.js"></script>

</body>
</html>
